<header class="bg-slate-900 text-slate-100 sticky top-0 z-50 border-b border-slate-800 shadow-lg">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">

          <!-- Logo / Título -->
          <div routerLink="/" class="shrink-0 flex items-center gap-2 cursor-pointer">
            <h1 class="text-lg font-black tracking-wider bg-linear-to-r from-amber-400 to-green-600 bg-clip-text text-transparent">
              WORLDCUP BET
            </h1>
          </div>

          <!-- Navegação para Desktop -->
          <nav class="hidden md:flex items-center space-x-1 text-sm font-semibold">
            <a
              routerLink="/"
              routerLinkActive="bg-slate-800 text-white"
              class="px-4 py-2 rounded-xl text-gray-400 hover:text-yellow-400 hover:bg-slate-800/50 transition-all cursor-pointer">
              Início
            </a>
            <a
              routerLink="/bet"
              routerLinkActive="bg-amber-500/10 text-amber-400 border border-amber-500/20"
              class="px-4 py-2 rounded-xl text-gray-400 hover:text-green-400 hover:bg-slate-800/50 transition-all cursor-pointer">
              Palpites
            </a>
            <a
              routerLink="/album"
              routerLinkActive="bg-blue-500/10 text-blue-400 border border-blue-500/20"
              class="px-4 py-2 rounded-xl text-gray-400 hover:text-blue-400 hover:bg-slate-800/50 transition-all cursor-pointer">
              Álbum
            </a>
          </nav>

          <!-- Widgets & Ações de Perfil (Desktop) -->
          <div class="hidden md:flex items-center space-x-4">
            <!-- Widget de Pontos (Se conecta com a lógica do Bolão) -->
            <div class="flex items-center space-x-2 bg-slate-950 px-3 py-1.5 rounded-lg border border-slate-800">
              <span class="text-xs">
              </span>
              <span class="text-xs font-mono font-bold text-green-400">100 pts</span>
            </div>

            <!-- Botão de Conta do Usuário -->
            <button class="bg-slate-800 hover:bg-slate-700 text-white font-medium px-4 py-2 rounded-xl border border-slate-700 hover:border-slate-600 transition-all text-xs flex items-center space-x-2">
              <span>👤</span>
              <span>Minha Conta</span>
            </button>
          </div>

          <!-- Botão Hamburger (Mobile) -->
          <div class="md:hidden flex items-center">
            <button
              (click)="toggleMenu()"
              class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-slate-800 focus:outline-none"
              aria-label="Menu principal">

              @if (!isMenuOpen) {
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
              } @else {
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
              }
            </button>
          </div>

        </div>
      </div>

      <!-- Menu Retrátil Mobile -->
      @if (isMenuOpen) {
        <div class="md:hidden bg-slate-900 border-t border-slate-800 px-4 py-4 space-y-3">
          <nav class="flex flex-col space-y-1">
            <a
              routerLink="/"
              routerLinkActive="bg-slate-800 text-white"
              (click)="closeMenu()"
              class="block px-4 py-2.5 rounded-xl text-base font-semibold text-gray-400 hover:bg-slate-800 cursor-pointer">
              Início
            </a>
            <a
              routerLink="/bet"
              routerLinkActive="bg-amber-500/10 text-amber-400 border border-amber-500/20"
              (click)="closeMenu()"
              class="block px-4 py-2.5 rounded-xl text-base font-semibold text-gray-400 hover:bg-slate-800 cursor-pointer">
              Palpites
            </a>
            <a
              routerLink="/album"
              routerLinkActive="bg-blue-500/10 text-blue-400 border border-blue-500/20"
              (click)="closeMenu()"
              class="block px-4 py-2.5 rounded-xl text-base font-semibold text-gray-400 hover:bg-slate-800 cursor-pointer">
              Álbum
            </a>
          </nav>

          <!-- Divisor Mobile -->
          <div class="border-t border-slate-800 my-2 pt-2"></div>

          <!-- Ações Mobile -->
          <div class="flex items-center justify-between px-4">
            <div class="flex items-center space-x-2 bg-slate-950 px-3 py-1.5 rounded-lg border border-slate-800">
              <span class="text-xs font-mono font-bold text-green-400">100 pts</span>
            </div>

            <button class="bg-slate-800 hover:bg-slate-700 text-white font-medium px-4 py-2 rounded-xl border border-slate-700 transition-all text-xs flex items-center space-x-2">
              <span>👤</span>
              <span>Minha Conta</span>
            </button>
          </div>
        </div>
      }
    </header>
